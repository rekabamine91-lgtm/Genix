<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Genix Payroll - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-primary">نظام Genix لإدارة الأجور 📊</h2>
        <div class="row mb-4">
            <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>عدد الموظفين</h5><h3>{{ stats.total_employees }}</h3></div></div>
            <div class="col-md-4"><div class="card p-3 shadow-sm bg-success text-white"><h5>كتلة الأجور الإجمالية</h5><h3>{{ stats.total_payroll }} دج</h3></div></div>
            <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>متوسط الرواتب</h5><h3>{{ stats.avg_salary }} دج</h3></div></div>
        </div>
        <table class="table table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr><th>الاسم</th><th>الرتبة</th><th>الراتب الصافي (دج)</th></tr>
            </thead>
            <tbody>
                {% for emp in employees %}
                <tr><td>{{ emp.name }}</td><td>{{ emp.position }}</td><td>{{ emp.net_salary }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
